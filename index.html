<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neuron Study - Умное обучение</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    :root {--p:#6366f1;--pd:#4f46e5;--s:#8f94fb;--bg:#0f0f2a;--t:#e5e7eb;--sb:#1a1a2e;--card:#1e1e2e;--border:#2b2b3b;}
    * {box-sizing:border-box;margin:0;padding:0;}
    body {background:var(--bg);color:var(--t);font-family:'Segoe UI',sans-serif;padding-top:60px;}
    
    .header {background:var(--sb);height:60px;display:flex;align-items:center;position:fixed;top:0;width:100%;z-index:100;padding:0 20px;justify-content:space-between;}
    .container {max-width:800px;margin:0 auto;padding:20px;}
    
    .card {background:var(--card);border-radius:15px;padding:20px;margin-bottom:20px;border:1px solid var(--border);box-shadow:0 4px 15px rgba(0,0,0,0.3);}
    .section-title {color:var(--p);margin-bottom:15px;display:flex;align-items:center;gap:10px;}
    
    .input-field {width:100%;padding:12px;margin-bottom:10px;background:var(--sb);border:1px solid var(--border);color:#fff;border-radius:8px;outline:none;}
    .btn {background:var(--p);color:#fff;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;width:100%;font-weight:bold;transition:0.3s;}
    .btn:hover {background:var(--pd);}

    .schedule-day-group {margin-bottom:20px;}
    .day-title {color:var(--s);border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:10px;font-size:1.1rem;}
    .schedule-item {display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;margin-bottom:5px;}
    
    .modal {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;}
    .modal.active {display:flex;}
    .modal-content {background:var(--card);width:90%;max-width:400px;padding:25px;border-radius:20px;position:relative;}

    .nav-bar {position:fixed;bottom:0;width:100%;background:var(--sb);display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid var(--border);}
    .nav-item {color:var(--t);text-decoration:none;font-size:0.8rem;text-align:center;opacity:0.6;}
    .nav-item.active {color:var(--p);opacity:1;}
    
    .toast {position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--p);padding:10px 20px;border-radius:20px;z-index:2000;}
  </style>
</head>
<body>

  <header class="header">
    <div style="font-weight:bold; font-size:1.2rem;">Neuron <span style="color:var(--p);">Study</span></div>
    <div id="user-info" style="font-size:0.9rem;">Вход...</div>
  </header>

  <div class="container">
    <div id="section-schedule">
      <div class="section-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 class="section-title"><i class="fas fa-calendar-alt"></i> Мое Расписание</h2>
        <button onclick="openModal('modal-schedule')" style="background:var(--p); border:none; color:white; width:35px; height:35px; border-radius:50%; cursor:pointer;">+</button>
      </div>
      <div id="schedule-container">
        </div>
    </div>
  </div>

  <div id="modal-schedule" class="modal">
    <div class="modal-content">
      <h3 style="margin-bottom:15px;">Добавить занятие</h3>
      <select id="schedule-day" class="input-field">
        <option value="Понедельник">Понедельник</option>
        <option value="Вторник">Вторник</option>
        <option value="Среда">Среда</option>
        <option value="Четверг">Четверг</option>
        <option value="Пятница">Пятница</option>
        <option value="Суббота">Суббота</option>
        <option value="Воскресенье">Воскресенье</option>
      </select>
      <input type="text" id="schedule-subject" placeholder="Предмет" class="input-field">
      <input type="time" id="schedule-time" class="input-field">
      <button class="btn" onclick="addSchedule()">Сохранить</button>
      <button onclick="closeModal('modal-schedule')" style="margin-top:10px; background:none; border:none; color:var(--t); width:100%; cursor:pointer;">Отмена</button>
    </div>
  </div>

  <script>
    // КОНФИГУРАЦИЯ FIREBASE (используй свою)
    const firebaseConfig = {
      apiKey: "AIzaSyDOaDVzzPjyYm4HWMND2XYWjLy_h4wty5s",
      authDomain: "neuron-ecosystem-2025.firebaseapp.com",
      projectId: "neuron-ecosystem-2025",
      storageBucket: "neuron-ecosystem-2025.firebasestorage.app",
      messagingSenderId: "589834476565",
      appId: "1:589834476565:web:cd4db27c95950b7edd421c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let schedule = {
      "Понедельник": [], "Вторник": [], "Среда": [], 
      "Четверг": [], "Пятница": [], "Суббота": [], "Воскресенье": []
    };

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('user-info').textContent = user.displayName || "Студент";
        loadData();
 } else {
    // Вместо редиректа запускаем вход через Google прямо здесь
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
    });

    async function loadData() {
      const doc = await db.collection('study').doc(auth.currentUser.uid).get();
      if (doc.exists && doc.data().schedule) {
        schedule = doc.data().schedule;
        renderSchedule();
      }
    }

    async function saveData() {
      await db.collection('study').doc(auth.currentUser.uid).set({
        schedule: schedule
      }, { merge: true });
      showToast("Данные сохранены");
    }

    function addSchedule() {
      const day = document.getElementById('schedule-day').value;
      const subject = document.getElementById('schedule-subject').value;
      const time = document.getElementById('schedule-time').value;

      if (!subject || !time) return alert("Заполните поля");

      if (!schedule[day]) schedule[day] = [];
      
      schedule[day].push({
        id: Date.now(),
        subject: subject,
        time: time
      });

      // Сортировка по времени
      schedule[day].sort((a,b) => a.time.localeCompare(b.time));

      renderSchedule();
      saveData();
      closeModal('modal-schedule');
    }

    function renderSchedule() {
      const container = document.getElementById('schedule-container');
      container.innerHTML = '';
      
      const days = ["Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота", "Воскресенье"];

      days.forEach(day => {
        const lessons = schedule[day] || [];
        if (lessons.length === 0) return;

        const dayBox = document.createElement('div');
        dayBox.className = 'schedule-day-group';
        dayBox.innerHTML = `<div class="day-title">${day}</div>`;

        lessons.forEach(lesson => {
          const item = document.createElement('div');
          item.className = 'schedule-item';
          item.innerHTML = `
            <div>
              <span style="font-weight:bold;">${lesson.time}</span> - ${lesson.subject}
            </div>
            <i class="fas fa-trash" onclick="deleteLesson('${day}', ${lesson.id})" style="cursor:pointer; opacity:0.5;"></i>
          `;
          dayBox.appendChild(item);
        });
        container.appendChild(dayBox);
      });
    }

    function deleteLesson(day, id) {
      schedule[day] = schedule[day].filter(l => l.id !== id);
      renderSchedule();
      saveData();
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function showToast(text) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = text;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }
  </script>
</body>
</html>
